AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS API Gateway for assessment. Uses lambdas to connect with Goolge Books and GitHub.

Resources:
  # ========= User Pool =========
  ApiUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: AssessmentUserPool
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
  ApiUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: AssessmentAppClient
      UserPoolId: !Ref ApiUserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false
  # ========= IAM Roles =========
  LibrarySearchExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
  # ========= Lambdas =========
  BookTitleSearchFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: BookTitleSearchFunction
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LibrarySearchExecutionRole.Arn
      Code: ../lambdas/lambda1
Outputs:
  UserPoolId:
    Description: ID of the Cognito User Pool
    Value: !Ref ApiUserPool
  UserPoolClientId:
    Description: ID of the Cognito App Client
    Value: !Ref ApiUserPoolClient
